name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secrets-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for TruffleHog to scan all history
      
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Audit Backend Dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Audit Frontend Dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high

  container-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-audit]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Build Backend Image
        working-directory: ./backend
        run: docker build -t quantum-backend:local .
        
      - name: Build Frontend Image
        working-directory: ./frontend
        run: docker build -t quantum-frontend:local .

      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quantum-backend:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quantum-frontend:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
